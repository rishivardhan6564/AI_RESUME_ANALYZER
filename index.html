<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>AI Resume Analyzer Pro</h1>
<p class="subtitle">ATS Style Resume Scanner & Role Match Tool</p>

<select id="jobRole">
<option value="frontend">Frontend Developer</option>
<option value="java">Java Developer</option>
<option value="python">Python Developer</option>
<option value="data">Data Analyst</option>
</select>

<textarea id="jobDesc" placeholder="Paste Job Description (Optional)"></textarea>

<input type="file" id="fileInput" accept=".txt">

<textarea id="resumeText" placeholder="Paste Resume Text Here"></textarea>

<button onclick="analyzeResume()">Analyze Resume</button>
<button onclick="downloadReport()">Download Report</button>

<div class="progress-box">
<div id="progressBar"></div>
</div>

<div id="scoreCards" class="cards"></div>

<div id="result"></div>

<p class="note">Private Analysis • Processed Locally in Browser • No Data Stored</p>

</div>

<script src="script.js"></script>
</body>
</html>
